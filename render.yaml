# =============================================================================
# Render deployment manifest — production-safe.
# =============================================================================
# Build runs ONLY: install deps, generate Prisma client, build Next.js.
# It NEVER runs `prisma db push`, `prisma db seed`, `deploy-demo.js`, or any
# script that mutates the database.
#
# Schema migrations are operator-managed: run `npx prisma migrate deploy`
# manually once, from a trusted shell, after the first deploy.
#
# All secrets are marked `sync: false` so Render prompts the operator to
# provide them in the dashboard. NEVER commit real values to this file.
# =============================================================================

services:
  - type: web
    name: erp-system
    runtime: node
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      # Secrets — set in Render dashboard, never in repo.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      # Production safety flags — keep all OFF.
      - key: ALLOW_SEED
        value: "false"
      - key: E2E_BYPASS_RATE_LIMIT
        value: "0"
      - key: E2E_ALLOW_AUTH_RESET
        value: "0"
      - key: E2E_ALLOW_PRODUCTION_DB
        value: "0"
