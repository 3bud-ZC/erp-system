services:
  - type: web
    name: erp-system
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: erp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://erp-system.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://erp-system.onrender.com/api

databases:
  - name: erp-db
    plan: free
    databaseName: erp_database
    user: erp_user
