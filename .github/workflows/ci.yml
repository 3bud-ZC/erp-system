name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: erp_test
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/erp_test
      E2E_BYPASS_RATE_LIMIT: 1
      # Allow the upsert-only auth-reset helper. Required for E2E setup to
      # log in as admin against the ephemeral CI postgres container.
      # MUST remain unset in any production environment — the script will
      # refuse to run otherwise.
      E2E_ALLOW_AUTH_RESET: 1
      NEXT_TELEMETRY_DISABLED: 1
      # CI uses an ephemeral PostgreSQL service container (NOT production).
      # Auth-only upsert seed is non-destructive; the destructive
      # `npm run seed` is intentionally not executed here.
      JWT_SECRET: ci-test-jwt-secret-32-characters-min-len-ok
      NEXTAUTH_SECRET: ci-test-nextauth-secret-32-characters-len

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma migrate (CI ephemeral DB only — never production)
        run: npx prisma migrate deploy

      - name: Bootstrap auth (upsert-only, non-destructive)
        run: npx tsx prisma/seed-auth.ts

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run e2e
